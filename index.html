<!DOCTYPE html>
<html>
<head>
  <title>Atelier du Sloan</title>

  <!-- Elegant font -->
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background-color: #f5f3ef;
      color: #111;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background: white;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
    }

    nav a {
      text-decoration: none;
      color: black;
      letter-spacing: 2px;
      font-size: 13px;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 60px 20px 20px;
    }

    header h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      font-weight: normal;
      letter-spacing: 2px;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .section-title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* FEATURED */
    .featured {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
    }

    .featured img {
      width: 100%;
      border-radius: 10px;
    }

    .featured-content h2 {
      font-weight: normal;
      font-size: 26px;
    }

    .price {
      margin: 15px 0;
      font-size: 18px;
    }

    .button {
      display: inline-block;
      padding: 12px 25px;
      background: black;
      color: white;
      text-decoration: none;
      letter-spacing: 1px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
    }

    .product {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #777;
    }

    /* MOBILE */
    @media(max-width: 800px) {
      .featured {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#lingerie">LINGERIE</a>
  <a href="#order">ORDER</a>
</nav>

<!-- HEADER -->
<header>
  <h1>Atelier du Sloan</h1>
</header>

<!-- FEATURED LINGERIE -->
<section id="lingerie">
  <div class="section-title">Lingerie</div>

  <div class="featured">
    <img src="lingerie.jpg">

    <div class="featured-content">
      <h2>Signature Lace Set</h2>
      <p>Delicate, structured lace crafted with precision and attention to form.</p>
      <div class="price">£310</div>

      <a href="#order" class="button">Purchase</a>
    </div>
  </div>
</section>

<!-- ORDER -->
<section id="order">
  <div class="section-title">Order</div>

  <div class="grid">

    <div class="product">
      <h3>Full Set</h3>
      <div class="price">£310</div>

      <form action="https://formspree.io/f/yourformid" method="POST">
        <input type="number" name="underbust" placeholder="Underbust (inches)" required>
        <input type="number" name="bust" placeholder="Bust (inches)" required>
        <input type="number" name="bottom_cup_depth" placeholder="Bottom Cup Depth (inches)" required>
        <input type="number" name="horizontal_hemisphere" placeholder="Horizontal Hemisphere (inches)" required>
        <input type="number" name="torso_length" placeholder="Torso Length (inches)" required>
        <input type="number" name="waist" placeholder="Waist (inches)" required>
        <input type="number" name="high_hip" placeholder="High Hip (inches)" required>
        <input type="number" name="low_hip" placeholder="Low Hip (inches)" required>
        <input type="number" name="rise" placeholder="Rise / Crotch Depth (inches)" required>

        <button type="submit">Order Full Set</button>
      </form>
    </div>

  </div>
</section>

<footer>
  © Atelier du Sloan
</footer>

</body>
</html>
