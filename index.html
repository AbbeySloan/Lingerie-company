<!DOCTYPE html>
<html>
<head>
  <title>My Lingerie Store</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    .product {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 8px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h1>My Lingerie Collection</h1>

<div class="product">
  <h2>Lace Set</h2>
  <p>£45</p>

  <form>
    <input type="number" placeholder="Bust (cm)" required>
    <input type="number" placeholder="Waist (cm)" required>
    <input type="number" placeholder="Hips (cm)" required>

    <button type="submit">Order</button>
  </form>
</div>

</body>
</html>
